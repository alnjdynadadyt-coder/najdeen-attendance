<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الحضور - النظام الشامل</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eef2f3; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        input, select, button { padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #007bff; color: white; }
        .btn-del { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>التقارير والإدارة</h2>
    <div class="input-group">
        <input type="date" id="repDate">
        <input type="text" id="repEmpCode" placeholder="كود الموظف (اختياري)">
        <button onclick="generateReport()" style="background:#007bff; color:white;">عرض التقرير</button>
        <button onclick="exportExcel()" style="background:green; color:white;">تصدير Excel</button>
        <button onclick="backupData()" style="background:#6c757d; color:white;">نسخة احتياطية (JSON)</button>
    </div>
    <table id="reportTable">
        <thead><tr><th>الاسم</th><th>التاريخ</th><th>الوقت</th><th>الحالة</th><th>السبب</th><th>إجراء</th></tr></thead>
        <tbody id="reportBody"></tbody>
    </table>
</div>

<div class="container">
    <h3>تسجيل حضور جديد</h3>
    <div class="input-group">
        <input type="text" id="empCode" placeholder="كود الموظف">
        <select id="status"><option>حاضر</option><option>متأخر</option><option>مجاز</option><option>غائب</option></select>
        <input type="text" id="reason" placeholder="السبب">
        <input type="time" id="customTime">
        <button onclick="registerAttendance()" style="background:#007bff; color:white;">تسجيل</button>
    </div>
</div>

<div class="container">
    <h3>إدارة الموظفين</h3>
    <div class="input-group">
        <input type="text" id="newEmpCode" placeholder="الكود">
        <input type="text" id="newEmpName" placeholder="الاسم">
        <button onclick="addEmployee()" style="background:#6c757d; color:white;">حفظ / تعديل</button>
    </div>
    <table><thead><tr><th>الكود</th><th>الاسم</th><th>إجراء</th></tr></thead><tbody id="employeesTable"></tbody></table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, collection, addDoc, onSnapshot, setDoc, deleteDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
        apiKey: "AIzaSyDHcLPo-oAQmJr4O6M0NEAN32eAvUBo9LU",
        projectId: "najdeenattendance",
        storageBucket: "najdeenattendance.firebasestorage.app",
        messagingSenderId: "614493844351",
        appId: "1:614493844351:web:8efb02501b86b6192de04a"
    }));

    // ضبط الوقت
    document.getElementById('customTime').value = new Date().toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit', hour12: false});

    window.registerAttendance = async () => {
        const code = document.getElementById('empCode').value;
        const statusIn = document.getElementById('status').value;
        const time = document.getElementById('customTime').value;
        const date = new Date().toISOString().split('T')[0];
        
        let status = statusIn;
        if(status === "حاضر" && time > "08:05") status = "متأخر";
        const finalTime = (status === "غائب" || status === "مجاز") ? "-" : time;

        const q = query(collection(db, "attendance"), where("empCode", "==", code), where("date", "==", date));
        if(!(await getDocs(q)).empty) { alert("مسجل مسبقاً!"); return; }

        await addDoc(collection(db, "attendance"), { empCode: code, date, time: finalTime, status, reason: document.getElementById('reason').value });
        alert("تم التسجيل");
    };

    window.generateReport = async () => {
        const date = document.getElementById('repDate').value;
        const code = document.getElementById('repEmpCode').value;
        let q = collection(db, "attendance");
        const snap = await getDocs(q);
        let html = "";
        snap.forEach(d => {
            let data = d.data();
            if((!date || data.date === date) && (!code || data.empCode === code)) {
                html += `<tr><td>${data.empCode}</td><td>${data.date}</td><td>${data.time}</td><td>${data.status}</td><td>${data.reason || ''}</td>
                <td><button class="btn-del" onclick="deleteDoc(doc(db, 'attendance', '${d.id}'))">حذف</button></td></tr>`;
            }
        });
        document.getElementById('reportBody').innerHTML = html;
    };

    window.addEmployee = async () => {
        await setDoc(doc(db, "employees", document.getElementById('newEmpCode').value), { name: document.getElementById('newEmpName').value });
    };

    onSnapshot(collection(db, "employees"), snap => {
        let rows = "";
        snap.forEach(d => {
            rows += `<tr><td>${d.id}</td><td>${d.data().name}</td><td><button class="btn-del" onclick="deleteDoc(doc(db, 'employees', '${d.id}'))">حذف</button></td></tr>`;
        });
        document.getElementById('employeesTable').innerHTML = rows;
    });

    window.exportExcel = () => {
        let a = document.createElement('a');
        a.href = 'data:application/vnd.ms-excel,' + encodeURIComponent(document.getElementById('reportTable').outerHTML);
        a.download = 'تقرير.xls'; a.click();
    };

    window.backupData = async () => {
        const snap = await getDocs(collection(db, "attendance"));
        let d = []; snap.forEach(x => d.push(x.data()));
        const a = document.createElement('a');
        a.href = 'data:application/json,' + encodeURIComponent(JSON.stringify(d));
        a.download = "backup.json"; a.click();
    };
</script>
</body>
</html>
