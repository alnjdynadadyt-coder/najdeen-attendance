<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الحضور الذكية</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eef2f3; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stats-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat-card { flex: 1; padding: 15px; text-align: center; color: white; border-radius: 8px; font-weight: bold; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        input, select, button { padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #007bff; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="stats-bar">
        <div class="stat-card" style="background:#007bff">حاضر: <span id="s_حاضر">0</span></div>
        <div class="stat-card" style="background:#ffc107">متأخر: <span id="s_متأخر">0</span></div>
        <div class="stat-card" style="background:#28a745">مجاز: <span id="s_مجاز">0</span></div>
        <div class="stat-card" style="background:#dc3545">غائب: <span id="s_غائب">0</span></div>
    </div>

    <h3>فلترة التقرير</h3>
    <div class="input-group">
        <select id="filterEmp"><option value="الكل">كل الموظفين</option></select>
        <select id="filterPeriod"><option value="يوم">يوم</option><option value="أسبوع">أسبوع</option><option value="شهر">شهر</option></select>
        <button onclick="renderTable()">تطبيق الفلترة</button>
        <button onclick="exportExcel()" style="background:green; color:white;">تصدير Excel</button>
    </div>

    <table>
        <thead><tr><th>الاسم</th><th>التاريخ (اليوم)</th><th>الوقت</th><th>الحالة</th><th>إجراء</th></tr></thead>
        <tbody id="attendanceTable"></tbody>
    </table>
</div>

<div class="container">
    <h3>تسجيل جديد</h3>
    <div class="input-group">
        <input type="text" id="empCode" placeholder="كود الموظف">
        <select id="status"><option>حاضر</option><option>متأخر</option><option>مجاز</option><option>غائب</option></select>
        <input type="time" id="customTime">
        <button onclick="registerAttendance()" style="background:#007bff; color:white;">تسجيل</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, onSnapshot, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
        apiKey: "AIzaSyDHcLPo-oAQmJr4O6M0NEAN32eAvUBo9LU",
        projectId: "najdeenattendance",
        storageBucket: "najdeenattendance.firebasestorage.app",
        messagingSenderId: "614493844351",
        appId: "1:614493844351:web:8efb02501b86b6192de04a"
    }));

    let allAttendance = [];
    document.getElementById('customTime').value = new Date().toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit', hour12: false});

    window.registerAttendance = async () => {
        const code = document.getElementById('empCode').value;
        const status = document.getElementById('status').value;
        const time = document.getElementById('customTime').value;
        const empSnap = await getDoc(doc(db, "employees", code));
        if (!empSnap.exists()) { alert("الكود خطأ"); return; }
        
        let finalStatus = status;
        const [h, m] = time.split(':').map(Number);
        if (status === "حاضر" && (h > 8 || (h === 8 && m > 5))) finalStatus = "متأخر";

        const now = new Date();
        const dateStr = now.toLocaleDateString('ar-EG', {weekday: 'long'}) + ' ' + now.toLocaleDateString('ar-EG');

        await addDoc(collection(db, "attendance"), { name: empSnap.data().name, status: finalStatus, time, date: dateStr, timestamp: now });
        alert("تم التسجيل");
    };

    window.renderTable = () => {
        const emp = document.getElementById('filterEmp').value;
        const period = document.getElementById('filterPeriod').value;
        let filtered = allAttendance.filter(item => emp === "الكل" || item.name === emp);
        // التصفية الزمنية يمكن توسيعها هنا
        let rows = "";
        filtered.forEach(d => {
            rows += `<tr><td>${d.name}</td><td>${d.date}</td><td>${d.time}</td><td>${d.status}</td>
            <td><button onclick="deleteDoc(doc(db, 'attendance', '${d.id}'))">حذف</button></td></tr>`;
        });
        document.getElementById('attendanceTable').innerHTML = rows;
    };

    window.exportExcel = () => {
        let table = document.getElementById('attendanceTable').outerHTML;
        let blob = new Blob(['\ufeff', table], {type: 'application/vnd.ms-excel'});
        let url = URL.createObjectURL(blob);
        let a = document.createElement('a');
        a.href = url; a.download = 'تقرير_الحضور.xls'; a.click();
    };

    onSnapshot(collection(db, "attendance"), snap => {
        allAttendance = [];
        snap.forEach(d => allAttendance.push({id: d.id, ...d.data()}));
        renderTable();
    });

    onSnapshot(collection(db, "employees"), snap => {
        let opts = '<option value="الكل">كل الموظفين</option>';
        snap.forEach(d => opts += `<option value="${d.data().name}">${d.data().name}</option>`);
        document.getElementById('filterEmp').innerHTML = opts;
    });
</script>
</body>
</html>
