<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الحضور الاحترافية</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .stat-box { background: #007bff; color: white; padding: 15px; border-radius: 10px; text-align: center; width: 30%; }
        input, select, button { padding: 10px; margin: 5px; border: 1px solid #ddd; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: center; }
        th { background-color: #f8f9fa; }
    </style>
</head>
<body>

<div class="container">
    <div class="stats" id="statsBoard"></div>
    <h2>تسجيل الحضور</h2>
    <div class="input-group">
        <input type="text" id="empCode" placeholder="كود الموظف">
        <select id="status"><option>حاضر</option><option>متأخر</option><option>مجاز</option><option>غائب</option></select>
        <input type="time" id="customTime">
        <button onclick="registerAttendance()">تسجيل</button>
        <button onclick="exportExcel()" style="background: green; color: white;">تصدير Excel</button>
    </div>
    <table>
        <thead><tr><th>الاسم</th><th>التاريخ</th><th>الوقت</th><th>الحالة</th><th>إجراء</th></tr></thead>
        <tbody id="attendanceTable"></tbody>
    </table>
</div>

<div class="container">
    <h3>إدارة الموظفين</h3>
    <table><thead><tr><th>الكود</th><th>الاسم</th><th>إجراء</th></tr></thead><tbody id="employeesTable"></tbody></table>
    <hr>
    <div class="input-group">
        <input type="text" id="newEmpCode" placeholder="الكود">
        <input type="text" id="newEmpName" placeholder="اسم الموظف">
        <button onclick="addEmployee()">حفظ / تعديل</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, onSnapshot, query, orderBy, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
      apiKey: "AIzaSyDHcLPo-oAQmJr4O6M0NEAN32eAvUBo9LU",
      projectId: "najdeenattendance",
      storageBucket: "najdeenattendance.firebasestorage.app",
      messagingSenderId: "614493844351",
      appId: "1:614493844351:web:8efb02501b86b6192de04a"
    }));

    document.getElementById('customTime').value = new Date().toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit', hour12: false});

    window.addEmployee = async () => {
        const code = document.getElementById('newEmpCode').value;
        const name = document.getElementById('newEmpName').value;
        await setDoc(doc(db, "employees", code), { name });
        alert("تم الحفظ بنجاح");
    };

    window.editEmployee = (code, name) => {
        document.getElementById('newEmpCode').value = code;
        document.getElementById('newEmpName').value = name;
    };

    window.exportExcel = () => {
        let table = document.getElementById('attendanceTable').outerHTML;
        let blob = new Blob(['\ufeff', table], {type: 'application/vnd.ms-excel'});
        let url = URL.createObjectURL(blob);
        let a = document.createElement('a');
        a.href = url; a.download = 'تقرير_الحضور.xls'; a.click();
    };

    // جلب البيانات وتحديث الإحصائيات
    onSnapshot(collection(db, "attendance"), (snap) => {
        let counts = { حاضر: 0, متأخر: 0, غائب: 0 };
        let rows = "";
        snap.forEach(d => {
            let data = d.data();
            counts[data.status] = (counts[data.status] || 0) + 1;
            rows += `<tr><td>${data.name}</td><td>${data.date}</td><td>${data.time}</td><td>${data.status}</td>
            <td><button onclick="deleteDoc(doc(db, 'attendance', '${d.id}'))">حذف</button></td></tr>`;
        });
        document.getElementById('attendanceTable').innerHTML = rows;
        document.getElementById('statsBoard').innerHTML = `
            <div class="stat-box">حاضر: ${counts.حاضر||0}</div>
            <div class="stat-box" style="background:#ffc107">متأخر: ${counts.متأخر||0}</div>
            <div class="stat-box" style="background:#dc3545">غائب: ${counts.غائب||0}</div>`;
    });

    onSnapshot(collection(db, "employees"), (snap) => {
        let rows = "";
        snap.forEach(d => {
            rows += `<tr><td>${d.id}</td><td>${d.data().name}</td>
            <td><button onclick="editEmployee('${d.id}', '${d.data().name}')">تعديل</button>
            <button onclick="deleteDoc(doc(db, 'employees', '${d.id}'))">حذف</button></td></tr>`;
        });
        document.getElementById('employeesTable').innerHTML = rows;
    });
    
    window.registerAttendance = async () => { /* نفس كود التسجيل السابق */ };
</script>
</body>
</html>
