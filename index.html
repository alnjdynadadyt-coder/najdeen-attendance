<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الموظفين والحضور</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eef2f3; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        input, select, button { padding: 12px; border: 1px solid #ccc; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #007bff; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>تسجيل الحضور</h2>
    <div class="input-group">
        <input type="text" id="empCode" placeholder="كود الموظف">
        <select id="status">
            <option value="حاضر">حاضر</option>
            <option value="متأخر">متأخر</option>
            <option value="مجاز">مجاز</option>
            <option value="غائب">غائب</option>
        </select>
        <input type="time" id="customTime">
        <button onclick="registerAttendance()">تسجيل</button>
    </div>
    <table>
        <thead><tr><th>الاسم</th><th>التاريخ</th><th>الوقت</th><th>الحالة</th><th>إجراء</th></tr></thead>
        <tbody id="attendanceTable"></tbody>
    </table>
</div>

<div class="container">
    <h3>قائمة الموظفين</h3>
    <table>
        <thead><tr><th>الكود</th><th>الاسم</th><th>إجراءات</th></tr></thead>
        <tbody id="employeesTable"></tbody>
    </table>
    <hr>
    <h3>إضافة/تعديل موظف</h3>
    <div class="input-group">
        <input type="text" id="newEmpCode" placeholder="كود الموظف">
        <input type="text" id="newEmpName" placeholder="اسم الموظف">
        <button onclick="addEmployee()">حفظ الموظف</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, onSnapshot, query, orderBy, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDHcLPo-oAQmJr4O6M0NEAN32eAvUBo9LU",
      authDomain: "najdeenattendance.firebaseapp.com",
      projectId: "najdeenattendance",
      storageBucket: "najdeenattendance.firebasestorage.app",
      messagingSenderId: "614493844351",
      appId: "1:614493844351:web:8efb02501b86b6192de04a",
      measurementId: "G-W1QED19TYN"
    };

    const db = getFirestore(initializeApp(firebaseConfig));
    document.getElementById('customTime').value = new Date().toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit', hour12: false});

    // تسجيل الحضور
    window.registerAttendance = async () => {
        const code = document.getElementById('empCode').value;
        const manualTime = document.getElementById('customTime').value;
        const manualStatus = document.getElementById('status').value;
        const empSnap = await getDoc(doc(db, "employees", code));
        if (!empSnap.exists()) { alert("الكود غير موجود!"); return; }

        let finalStatus = manualStatus;
        const [hours, minutes] = manualTime.split(':').map(Number);
        if (manualStatus === "حاضر" && (hours > 8 || (hours === 8 && minutes > 5))) finalStatus = "متأخر";

        const today = new Date();
        const dayName = today.toLocaleDateString('ar-EG', { weekday: 'long' });
        const dateStr = `${dayName} ${today.toLocaleDateString('ar-EG')}`;

        await addDoc(collection(db, "attendance"), {
            name: empSnap.data().name, status: finalStatus, date: dateStr,
            time: manualTime, timestamp: new Date()
        });
    };

    // إدارة الموظفين
    window.addEmployee = async () => {
        const code = document.getElementById('newEmpCode').value;
        const name = document.getElementById('newEmpName').value;
        await setDoc(doc(db, "employees", code), { name: name });
        alert("تم الحفظ/التعديل");
    };

    window.deleteEmployee = async (code) => { await deleteDoc(doc(db, "employees", code)); };
    window.deleteRecord = async (id) => { await deleteDoc(doc(db, "attendance", id)); };

    // جلب البيانات
    onSnapshot(query(collection(db, "attendance"), orderBy("timestamp", "desc")), (snap) => {
        let rows = "";
        snap.forEach(d => {
            const data = d.data();
            rows += `<tr><td>${data.name}</td><td>${data.date}</td><td>${data.time}</td><td>${data.status}</td>
            <td><button onclick="deleteRecord('${d.id}')">حذف</button></td></tr>`;
        });
        document.getElementById('attendanceTable').innerHTML = rows;
    });

    onSnapshot(collection(db, "employees"), (snap) => {
        let rows = "";
        snap.forEach(d => {
            rows += `<tr><td>${d.id}</td><td>${d.data().name}</td>
            <td><button onclick="deleteEmployee('${d.id}')">حذف</button></td></tr>`;
        });
        document.getElementById('employeesTable').innerHTML = rows;
    });
</script>
</body>
</html>
