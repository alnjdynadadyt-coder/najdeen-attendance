<div class="container" style="margin-top: 20px;">
    <h3>إضافة موظف جديد</h3>
    <div class="input-group">
        <input type="text" id="newEmpCode" placeholder="كود الموظف الجديد">
        <input type="text" id="newEmpName" placeholder="اسم الموظف">
        <button onclick="addEmployee()">حفظ الموظف</button>
    </div>
</div>

<script type="module">
    // تأكد من استيراد دالة setDoc من مكتبة فايربيس
    import { setDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    window.addEmployee = async () => {
        const code = document.getElementById('newEmpCode').value;
        const name = document.getElementById('newEmpName').value;

        if (!code || !name) {
            alert("يرجى إدخال الكود والاسم!");
            return;
        }

        try {
            // حفظ الموظف في قاعدة البيانات
            await setDoc(doc(db, "employees", code), {
                name: name
            });
            alert("تم حفظ الموظف: " + name);
            // تفريغ الخانات بعد الحفظ
            document.getElementById('newEmpCode').value = "";
            document.getElementById('newEmpName').value = "";
        } catch (e) {
            alert("حدث خطأ: " + e.message);
        }
    };
</script>
