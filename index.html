<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الحضور - اعدادية النجدين للبنين</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 15px; background: #f4f7f6; }
        .container { max-width: 950px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .header { text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-bottom: 20px; }
        .input-group { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #eee; }
        input, select, button { padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
        button { cursor: pointer; transition: 0.3s; }
        .btn-blue { background: #3498db; color: white; border: none; }
        .btn-green { background: #27ae60; color: white; border: none; }
        .btn-red { background: #e74c3c; color: white; border: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #34495e; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>المديرية العامة لتربية القادسية - تربية الحمزة</h2>
        <h3>اعدادية النجدين للبنين</h3>
    </div>

    <!-- ميزات النظام الجديدة -->
    <div class="input-group">
        <input type="date" id="dateSelector" onchange="renderAttendance()">
        <input type="text" id="reason" placeholder="سبب الغياب/الإجازة/ملاحظة">
        <button onclick="registerAttendance()" class="btn-blue">تسجيل الحضور</button>
        <button onclick="backupData()" class="btn-green">تحميل نسخة احتياطية</button>
    </div>

    <!-- الإحصائيات -->
    <div style="display:flex; gap:10px; justify-content: space-around; margin-bottom: 20px;">
        <div>حاضر: <span id="s_حاضر">0</span></div>
        <div>متأخر: <span id="s_متأخر">0</span></div>
        <div>مجاز: <span id="s_مجاز">0</span></div>
        <div>غائب: <span id="s_غائب">0</span></div>
    </div>

    <table id="attendanceTable">
        <thead><tr><th>الاسم</th><th>اليوم</th><th>التاريخ</th><th>الحالة</th><th>السبب</th><th>إجراء</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, getDocs, doc, deleteDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
        apiKey: "AIzaSyDHcLPo-oAQmJr4O6M0NEAN32eAvUBo9LU",
        projectId: "najdeenattendance",
        storageBucket: "najdeenattendance.firebasestorage.app",
        messagingSenderId: "614493844351",
        appId: "1:614493844351:web:8efb02501b86b6192de04a"
    }));

    // إعدادات التاريخ
    const today = new Date();
    document.getElementById('dateSelector').valueAsDate = today;

    window.registerAttendance = async () => {
        const code = prompt("أدخل كود الموظف:");
        if (!code) return;
        const date = document.getElementById('dateSelector').value;
        const day = new Date(date).toLocaleDateString('ar-EG', {weekday: 'long'});
        const status = "حاضر"; // افتراضي
        const reason = document.getElementById('reason').value;

        const q = query(collection(db, "attendance"), where("empCode", "==", code), where("date", "==", date));
        const check = await getDocs(q);
        if (!check.empty) { alert("الموظف مسجل بالفعل لهذا اليوم!"); return; }

        const empSnap = await getDoc(doc(db, "employees", code));
        if (!empSnap.exists()) { alert("كود غير موجود"); return; }

        await addDoc(collection(db, "attendance"), { empCode: code, name: empSnap.data().name, status, reason, date, day });
        alert("تم التسجيل");
    };

    window.renderAttendance = () => {
        const date = document.getElementById('dateSelector').value;
        const q = query(collection(db, "attendance"), where("date", "==", date));
        onSnapshot(q, snap => {
            let html = "", stats = {حاضر:0, متأخر:0, مجاز:0, غائب:0};
            snap.forEach(d => {
                let data = d.data();
                stats[data.status] = (stats[data.status] || 0) + 1;
                html += `<tr><td>${data.name}</td><td>${data.day}</td><td>${data.date}</td><td>${data.status}</td><td>${data.reason||''}</td>
                <td><button class="btn-red" onclick="deleteDoc(doc(db, 'attendance', '${d.id}'))">حذف</button></td></tr>`;
            });
            document.querySelector('#attendanceTable tbody').innerHTML = html;
            for(let s in stats) document.getElementById('s_'+s).innerText = stats[s];
        });
    };

    window.backupData = async () => {
        const snap = await getDocs(collection(db, "attendance"));
        let data = [];
        snap.forEach(d => data.push(d.data()));
        const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "backup_attendance.json";
        a.click();
    };

    renderAttendance();
</script>
</body>
</html>
