<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الحضور - اعدادية النجدين للبنين</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eef2f3; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stats-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card { flex: 1; min-width: 120px; padding: 15px; text-align: center; color: white; border-radius: 8px; font-weight: bold; }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        input, select, button { padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #007bff; color: white; }
        .btn-del { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
        .adv-report-container { background: #fff8e1; border: 2px solid #ffc107; padding: 20px; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container" style="text-align:center;">
    <h2 style="color:#007bff;">المديرية العامة لتربية القادسية - تربية الحمزة</h2>
    <h3>اعدادية النجدين للبنين</h3>
</div>

<div class="container">
    <h3>التحكم في التاريخ والتقارير</h3>
    <input type="date" id="dateSelector" onchange="renderTable()">
    <button onclick="exportExcel()" style="background:green; color:white;">تصدير Excel</button>
    <button onclick="backupData()" style="background:#6c757d; color:white;">نسخة احتياطية (JSON)</button>
    
    <div class="stats-bar" style="margin-top: 20px;">
        <div class="stat-card" style="background:#007bff">حاضر: <span id="s_حاضر">0</span></div>
        <div class="stat-card" style="background:#ffc107">متأخر: <span id="s_متأخر">0</span></div>
        <div class="stat-card" style="background:#28a745">مجاز: <span id="s_مجاز">0</span></div>
        <div class="stat-card" style="background:#dc3545">غائب: <span id="s_غائب">0</span></div>
    </div>

    <hr>
    <h3>تسجيل الحضور</h3>
    <div class="input-group">
        <input type="text" id="empCode" placeholder="كود الموظف">
        <select id="status"><option>حاضر</option><option>متأخر</option><option>مجاز</option><option>غائب</option></select>
        <input type="text" id="reason" placeholder="سبب الغياب/الملاحظة">
        <input type="time" id="customTime">
        <button onclick="registerAttendance()" style="background:#007bff; color:white;">تسجيل</button>
    </div>
    <table id="mainTable">
        <thead><tr><th>الاسم</th><th>اليوم</th><th>التاريخ</th><th>الوقت</th><th>الحالة</th><th>السبب</th><th>إجراء</th></tr></thead>
        <tbody id="attendanceTable"></tbody>
    </table>
</div>

<div class="container adv-report-container">
    <h3>تقارير متقدمة (موظف / فترة)</h3>
    <div class="input-group">
        <input type="text" id="advEmpCode" placeholder="كود الموظف (للتقرير الفردي)">
        <input type="date" id="startDate" title="من تاريخ">
        <input type="date" id="endDate" title="إلى تاريخ">
        <button onclick="generateAdvancedReport()" style="background:#28a745; color:white;">عرض التقرير المخصص</button>
    </div>
    <table id="advReportTable">
        <thead><tr><th>الاسم</th><th>التاريخ</th><th>الوقت</th><th>الحالة</th><th>السبب</th></tr></thead>
        <tbody id="advReportBody"></tbody>
    </table>
</div>

<div class="container">
    <h3>إدارة الموظفين</h3>
    <div class="input-group">
        <input type="text" id="newEmpCode" placeholder="الكود">
        <input type="text" id="newEmpName" placeholder="الاسم">
        <button onclick="addEmployee()" style="background:#6c757d; color:white;">حفظ / تعديل</button>
    </div>
    <table><thead><tr><th>الكود</th><th>الاسم</th><th>إجراء</th></tr></thead><tbody id="employeesTable"></tbody></table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, onSnapshot, setDoc, deleteDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
        apiKey: "AIzaSyDHcLPo-oAQmJr4O6M0NEAN32eAvUBo9LU",
        projectId: "najdeenattendance",
        storageBucket: "najdeenattendance.firebasestorage.app",
        messagingSenderId: "614493844351",
        appId: "1:614493844351:web:8efb02501b86b6192de04a"
    }));

    document.getElementById('dateSelector').valueAsDate = new Date();
    document.getElementById('customTime').value = new Date().toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit', hour12: false});

    window.registerAttendance = async () => {
        const code = document.getElementById('empCode').value;
        const date = document.getElementById('dateSelector').value;
        const statusRaw = document.getElementById('status').value;
        const timeInput = document.getElementById('customTime').value;
        const reason = document.getElementById('reason').value;

        let status = statusRaw;
        if(status === "حاضر" && timeInput > "08:05") status = "متأخر";
        const time = (status === "غائب" || status === "مجاز") ? "-" : timeInput;
        const day = new Date(date).toLocaleDateString('ar-EG', {weekday: 'long'});

        const q = query(collection(db, "attendance"), where("empCode", "==", code), where("date", "==", date));
        if (!(await getDocs(q)).empty) { alert("الموظف مسجل بالفعل لهذا اليوم!"); return; }

        const empSnap = await getDoc(doc(db, "employees", code));
        if (!empSnap.exists()) { alert("الكود غير موجود"); return; }

        await addDoc(collection(db, "attendance"), { empCode: code, name: empSnap.data().name, status, time, date, day, reason });
        alert("تم التسجيل");
    };

    // وظيفة التقرير المتقدم
    window.generateAdvancedReport = async () => {
        const empCode = document.getElementById('advEmpCode').value;
        const start = document.getElementById('startDate').value;
        const end = document.getElementById('endDate').value;
        const snap = await getDocs(collection(db, "attendance"));
        let rows = "";
        snap.forEach(d => {
            let data = d.data();
            let dateMatch = (!start || data.date >= start) && (!end || data.date <= end);
            let empMatch = (!empCode || data.empCode === empCode);
            if (dateMatch && empMatch) {
                rows += `<tr><td>${data.name}</td><td>${data.date}</td><td>${data.time}</td><td>${data.status}</td><td>${data.reason || ''}</td></tr>`;
            }
        });
        document.getElementById('advReportBody').innerHTML = rows;
    };

    window.deleteAtt = (id) => deleteDoc(doc(db, 'attendance', id));
    window.deleteEmp = (id) => deleteDoc(doc(db, 'employees', id));

    window.renderTable = () => {
        const date = document.getElementById('dateSelector').value;
        onSnapshot(query(collection(db, "attendance"), where("date", "==", date)), snap => {
            let rows = "", stats = {حاضر:0, متأخر:0, مجاز:0, غائب:0};
            snap.forEach(d => {
                let data = d.data();
                if(stats.hasOwnProperty(data.status)) stats[data.status]++;
                rows += `<tr><td>${data.name}</td><td>${data.day}</td><td>${data.date}</td><td>${data.time}</td><td>${data.status}</td><td>${data.reason || ''}</td>
                <td><button class="btn-del" onclick="deleteAtt('${d.id}')">حذف</button></td></tr>`;
            });
            document.getElementById('attendanceTable').innerHTML = rows;
            for(let k in stats) document.getElementById('s_'+k).innerText = stats[k];
        });
    };

    window.addEmployee = async () => {
        const code = document.getElementById('newEmpCode').value;
        const name = document.getElementById('newEmpName').value;
        if(code && name) await setDoc(doc(db, "employees", code), { name });
    };

    window.exportExcel = () => {
        let content = `<h1>تقرير الحضور: ${document.getElementById('dateSelector').value}</h1>` + document.getElementById('mainTable').outerHTML;
        let a = document.createElement('a');
        a.href = 'data:application/vnd.ms-excel,' + encodeURIComponent(content);
        a.download = 'تقرير_' + document.getElementById('dateSelector').value + '.xls';
        a.click();
    };

    window.backupData = async () => {
        const snap = await getDocs(collection(db, "attendance"));
        let data = []; snap.forEach(d => data.push(d.data()));
        const a = document.createElement('a');
        a.href = 'data:application/json,' + encodeURIComponent(JSON.stringify(data));
        a.download = "backup_" + new Date().toLocaleDateString() + ".json";
        a.click();
    };

    onSnapshot(collection(db, "employees"), snap => {
        let rows = "";
        snap.forEach(d => {
            rows += `<tr><td>${d.id}</td><td>${d.data().name}</td><td><button onclick="document.getElementById('newEmpCode').value='${d.id}'; document.getElementById('newEmpName').value='${d.data().name}';">تعديل</button> <button class="btn-del" onclick="deleteEmp('${d.id}')">حذف</button></td></tr>`;
        });
        document.getElementById('employeesTable').innerHTML = rows;
    });

    renderTable();
</script>
</body>
</html>
