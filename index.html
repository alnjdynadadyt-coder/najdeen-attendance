<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الحضور - النجدين</title>
    <!-- استدعاء Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDHcLPo-oAQmJr406M0NEAN32eAvUBo9LU",
            authDomain: "najdeenattendance.firebaseapp.com",
            projectId: "najdeenattendance",
            storageBucket: "najdeenattendance.firebasestorage.app",
            messagingSenderId: "614493844351",
            appId: "1:614493844351:web:8efb02501b86b6192de04a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.saveAttendance = async function() {
            const name = document.getElementById("name").value;
            if(name) {
                try {
                    await addDoc(collection(db, "attendance"), {
                        employeeName: name,
                        date: new Date().toLocaleDateString('ar-EG'),
                        timestamp: new Date().toLocaleTimeString('ar-EG')
                    });
                    alert("تم تسجيل حضور: " + name);
                    document.getElementById("name").value = ""; // تفريغ الخانة بعد التسجيل
                } catch (e) {
                    alert("حدث خطأ، حاول مرة أخرى");
                }
            } else {
                alert("يرجى كتابة الاسم أولاً");
            }
        };
    </script>
</head>
<body>
    <div style="text-align:center; padding:50px; font-family: sans-serif;">
        <h1>نظام تسجيل حضور النجدين</h1>
        <input type="text" id="name" placeholder="أدخل اسمك هنا" style="padding: 10px; width: 200px;">
        <button onclick="saveAttendance()" style="padding: 10px;">إرسال الحضور</button>
    </div>
</body>
</html>
