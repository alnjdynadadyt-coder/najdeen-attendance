<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الحضور الذكية</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-box { padding: 10px; border-radius: 8px; color: white; width: 20%; text-align: center; font-weight: bold; }
        input, select, button { padding: 8px; margin: 5px; border-radius: 5px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="stats">
        <div class="stat-box" style="background:#007bff">حاضر: <span id="s_حاضر">0</span></div>
        <div class="stat-box" style="background:#ffc107">متأخر: <span id="s_متأخر">0</span></div>
        <div class="stat-box" style="background:#28a745">مجاز: <span id="s_مجاز">0</span></div>
        <div class="stat-box" style="background:#dc3545">غائب: <span id="s_غائب">0</span></div>
    </div>

    <h3>تسجيل الحضور</h3>
    <input type="text" id="empCode" placeholder="كود الموظف">
    <select id="status"><option>حاضر</option><option>متأخر</option><option>مجاز</option><option>غائب</option></select>
    <input type="time" id="customTime">
    <button onclick="registerAttendance()">تسجيل</button>
    <button onclick="exportExcel()" style="background: green; color: white;">تصدير Excel</button>
    
    <hr>
    <h3>الفلترة والتقرير</h3>
    <select id="filterEmp"><option value="الكل">كل الموظفين</option></select>
    <select id="filterPeriod"><option value="يوم">يوم</option><option value="أسبوع">أسبوع</option><option value="شهر">شهر</option></select>

    <table>
        <thead><tr><th>الاسم</th><th>التاريخ</th><th>الوقت</th><th>الحالة</th><th>إجراء</th></tr></thead>
        <tbody id="attendanceTable"></tbody>
    </table>
</div>

<div class="container">
    <h3>إدارة الموظفين</h3>
    <table><thead><tr><th>الكود</th><th>الاسم</th><th>إجراء</th></tr></thead><tbody id="employeesTable"></tbody></table>
    <input type="text" id="newEmpCode" placeholder="الكود">
    <input type="text" id="newEmpName" placeholder="الاسم">
    <button onclick="addEmployee()">حفظ / تعديل</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, collection, addDoc, onSnapshot, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
        apiKey: "AIzaSyDHcLPo-oAQmJr4O6M0NEAN32eAvUBo9LU",
        projectId: "najdeenattendance",
        storageBucket: "najdeenattendance.firebasestorage.app",
        messagingSenderId: "614493844351",
        appId: "1:614493844351:web:8efb02501b86b6192de04a"
    }));

    window.registerAttendance = async () => {
        const code = document.getElementById('empCode').value;
        const status = document.getElementById('status').value;
        const time = document.getElementById('customTime').value;
        const name = await getDoc(doc(db, "employees", code)).then(s => s.exists() ? s.data().name : null);
        if (!name) { alert("الكود غير موجود"); return; }
        await addDoc(collection(db, "attendance"), { name, status, time, date: new Date().toLocaleDateString('ar-EG'), timestamp: new Date() });
        alert("تم التسجيل");
    };

    window.addEmployee = async () => {
        await setDoc(doc(db, "employees", document.getElementById('newEmpCode').value), { name: document.getElementById('newEmpName').value });
        alert("تم الحفظ");
    };

    window.editEmployee = (code, name) => {
        document.getElementById('newEmpCode').value = code;
        document.getElementById('newEmpName').value = name;
    };

    window.deleteDoc = async (coll, id) => { await deleteDoc(doc(db, coll, id)); };

    window.exportExcel = () => {
        let uri = 'data:application/vnd.ms-excel;base64,',
            template = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head></head><body><table>{table}</table></body></html>',
            base64 = s => window.btoa(unescape(encodeURIComponent(s))),
            format = (s, c) => s.replace(/{(\w+)}/g, (m, p) => c[p]);
        let table = document.getElementById('attendanceTable').innerHTML;
        let ctx = {worksheet: 'Worksheet', table: table};
        window.location.href = uri + base64(format(template, ctx));
    };

    // مراقبة البيانات
    onSnapshot(collection(db, "attendance"), snap => {
        let rows = "", stats = {حاضر:0, متأخر:0, مجاز:0, غائب:0};
        snap.forEach(d => {
            let data = d.data();
            stats[data.status]++;
            rows += `<tr><td>${data.name}</td><td>${data.date}</td><td>${data.time}</td><td>${data.status}</td><td><button onclick="deleteDoc('attendance', '${d.id}')">حذف</button></td></tr>`;
        });
        document.getElementById('attendanceTable').innerHTML = rows;
        for(let k in stats) document.getElementById('s_'+k).innerText = stats[k];
    });

    onSnapshot(collection(db, "employees"), snap => {
        let rows = "", options = '<option value="الكل">كل الموظفين</option>';
        snap.forEach(d => {
            rows += `<tr><td>${d.id}</td><td>${d.data().name}</td><td><button onclick="editEmployee('${d.id}', '${d.data().name}')">تعديل</button> <button onclick="deleteDoc('employees', '${d.id}')">حذف</button></td></tr>`;
            options += `<option value="${d.data().name}">${d.data().name}</option>`;
        });
        document.getElementById('employeesTable').innerHTML = rows;
        document.getElementById('filterEmp').innerHTML = options;
    });
</script>
</body>
</html>
